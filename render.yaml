services:
  - type: web
    name: snip-url-shortener
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snip-db
          property: connectionString
      - key: BASE_URL
        sync: false

databases:
  - name: snip-db
    plan: free
